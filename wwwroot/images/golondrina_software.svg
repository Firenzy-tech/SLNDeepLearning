<svg viewBox="50 80 480 120" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Golondrina Software — Data Science</title>
  <desc>Logo con golondrina en silueta gris y nombre de empresa</desc>

  <style>
    @keyframes flap {
      0%,100% { d: path("M0,-6 C-10,-14 -34,-18 -46,-10 C-32,-4 -16,0 0,2 Z M0,-6 C10,-14 34,-18 46,-10 C32,-4 16,0 0,2 Z"); }
      50%      { d: path("M0,-6 C-8,-8 -28,-6 -38,-2 C-26,2 -14,2 0,2 Z M0,-6 C8,-8 28,-6 38,-2 C26,2 14,2 0,2 Z"); }
    }
    .wings { animation: flap 0.35s ease-in-out infinite; }

    .name {
      font-family: sans-serif;
      font-size: 38px;
      font-weight: 500;
      fill: #2C2C2A;
    }
    .sub {
      font-family: sans-serif;
      font-size: 15px;
      font-weight: 400;
      fill: #888780;
      letter-spacing: 3px;
    }
    .divider {
      stroke: #D3D1C7;
      stroke-width: 0.5;
    }
  </style>

  <g transform="translate(120, 140)" fill="#444441">
    <path class="wings"
      d="M0,-6 C-10,-14 -34,-18 -46,-10 C-32,-4 -16,0 0,2 Z
         M0,-6 C10,-14 34,-18 46,-10 C32,-4 16,0 0,2 Z"/>
    <ellipse cx="0" cy="3" rx="7" ry="5"/>
    <path d="M-3,7 C-6,13 -10,20 -8,23 C-5,19 -2,16 0,15 C2,16 5,19 8,23 C10,20 6,13 3,7 Z"/>
    <circle cx="0" cy="-5" r="7"/>
    <path d="M-2,-11 L0,-15 L2,-11 Z"/>
  </g>

  <line x1="185" y1="100" x2="185" y2="180" class="divider"/>

  <text x="202" y="153" class="name">Golondrina</text>
  <text x="202" y="183" class="sub">SOFTWARE  ·  DATA SCIENCE</text>

</svg>
