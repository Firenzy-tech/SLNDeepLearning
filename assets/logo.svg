<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Neural Network Icon -->
  <g transform="translate(10, 10)">
    <!-- Connections -->
    <line x1="10" y1="20" x2="25" y2="10" stroke="#00f2fe" stroke-width="2" opacity="0.6"/>
    <line x1="10" y1="20" x2="25" y2="30" stroke="#00f2fe" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="10" x2="40" y2="20" stroke="#4facfe" stroke-width="2" opacity="0.8"/>
    <line x1="25" y1="30" x2="40" y2="20" stroke="#4facfe" stroke-width="2" opacity="0.8"/>
    
    <!-- Nodes -->
    <circle cx="10" cy="20" r="4" fill="#ffffff" filter="url(#glow)"/>
    <circle cx="25" cy="10" r="5" fill="url(#grad1)"/>
    <circle cx="25" cy="30" r="5" fill="url(#grad1)"/>
    <circle cx="40" cy="20" r="6" fill="#00f2fe" filter="url(#glow)"/>
  </g>

  <!-- Text -->
  <text x="60" y="38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" fill="#2c3e50" letter-spacing="1">
    SLN<tspan fill="url(#grad1)">AI</tspan>
  </text>
</svg>
